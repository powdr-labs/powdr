name: "Run Modal prove-stark"
description: "Uploads prepared caches to a Modal Volume, runs prove-stark on Modal GPU for each requested APC count, and post-processes the metrics into a results directory. Assumes the caller already activated a Python venv at .venv containing the modal client and the powdr scripts' requirements, and that the openvm-eth checkout + cargo openvm toolchain are in place."

inputs:
  apc-counts:
    description: "Space-separated list of APC counts to prove on Modal (e.g. '0 10 30')."
    required: true
  block-number:
    description: "Ethereum block number to prove."
    required: true
  openvm-eth-ref:
    description: "openvm-eth git ref Modal should build against. Must match the ref used to populate apc-cache.tgz."
    required: true
  modal-volume:
    description: "Name of the Modal Volume to use for cache + output exchange."
    required: true
  run-id:
    description: "Unique per-run identifier; used as the path prefix on the Modal Volume so concurrent runs do not collide."
    required: true
  powdr-sha:
    description: "powdr commit SHA Modal should build against."
    required: true
  modal-token-id:
    description: "Modal token id (pass secrets.MODAL_TOKEN_ID)."
    required: true
  modal-token-secret:
    description: "Modal token secret (pass secrets.MODAL_TOKEN_SECRET)."
    required: true
  rpc-cache-tgz:
    description: "Path to the prepared rpc-cache.tgz (repo-root-relative)."
    required: false
    default: "rpc-cache.tgz"
  apc-cache-tgz:
    description: "Path to the prepared apc-cache.tgz (repo-root-relative). Must contain reth-apc-<N>.bin for every N in apc-counts."
    required: false
    default: "apc-cache.tgz"
  apc-candidates-json:
    description: "Path to a pre-compiled apc_candidates.json snapshot (repo-root-relative). Moved into the results dir on success."
    required: false
    default: "apc_candidates_modal.json"
  results-dir:
    description: "Output directory (repo-root-relative) where post-processed Modal metrics + plots are written."
    required: false
    default: "results/reth_gpu_modal"

runs:
  using: "composite"
  steps:
    - name: Upload caches to Modal Volume
      shell: bash
      env:
        MODAL_TOKEN_ID: ${{ inputs.modal-token-id }}
        MODAL_TOKEN_SECRET: ${{ inputs.modal-token-secret }}
        MODAL_VOLUME: ${{ inputs.modal-volume }}
        RUN_ID: ${{ inputs.run-id }}
        RPC_CACHE_TGZ: ${{ inputs.rpc-cache-tgz }}
        APC_CACHE_TGZ: ${{ inputs.apc-cache-tgz }}
      run: |
        source .venv/bin/activate
        # Volume.from_name(..., create_if_missing=True) in modal_app.py only
        # creates the volume when the function runs; `modal volume put` is a
        # separate path that errors if the volume doesn't already exist, so
        # create it idempotently here.
        modal volume create "$MODAL_VOLUME" 2>/dev/null || true
        modal volume put "$MODAL_VOLUME" "$RPC_CACHE_TGZ" "/${RUN_ID}/rpc-cache.tgz" --force
        modal volume put "$MODAL_VOLUME" "$APC_CACHE_TGZ" "/${RUN_ID}/apc-cache.tgz" --force

    - name: Run prove-stark on Modal (best effort)
      # Sequential over the requested apc counts. Each Modal invocation
      # includes its own cargo build (a few minutes) and the actual GPU
      # prove. Modal-side failures (transient platform issues, GPU
      # unavailability, etc.) must NOT abort the action — log a warning per
      # failed apc count and let the post-process step build whatever
      # subset of metrics arrived on the volume.
      shell: bash
      continue-on-error: true
      env:
        MODAL_TOKEN_ID: ${{ inputs.modal-token-id }}
        MODAL_TOKEN_SECRET: ${{ inputs.modal-token-secret }}
        APC_COUNTS: ${{ inputs.apc-counts }}
        BLOCK_NUMBER: ${{ inputs.block-number }}
        RUN_ID: ${{ inputs.run-id }}
        POWDR_SHA: ${{ inputs.powdr-sha }}
        OPENVM_ETH_REF: ${{ inputs.openvm-eth-ref }}
      run: |
        source .venv/bin/activate
        for apc in $APC_COUNTS; do
          modal run gpu_bench/modal_app.py::prove_block \
            --apc "$apc" \
            --block "$BLOCK_NUMBER" \
            --run-id "$RUN_ID" \
            --powdr-sha "$POWDR_SHA" \
            --openvm-eth-ref "$OPENVM_ETH_REF" \
            || echo "::warning::modal prove apc=${apc} failed; continuing"
        done

    - name: Download Modal outputs and post-process (best effort)
      # Tolerates partial Modal output: any apc whose metrics.json is
      # missing on the volume is skipped with a warning. If no apc
      # produced output at all, the results-dir is dropped so the
      # artifact does not ship an empty stub.
      shell: bash
      continue-on-error: true
      env:
        MODAL_TOKEN_ID: ${{ inputs.modal-token-id }}
        MODAL_TOKEN_SECRET: ${{ inputs.modal-token-secret }}
        MODAL_VOLUME: ${{ inputs.modal-volume }}
        RUN_ID: ${{ inputs.run-id }}
        APC_COUNTS: ${{ inputs.apc-counts }}
        APC_CANDIDATES_JSON: ${{ inputs.apc-candidates-json }}
        RES_DIR: ${{ inputs.results-dir }}
      run: |
        source .venv/bin/activate
        mkdir -p modal-out
        modal volume get "$MODAL_VOLUME" "/${RUN_ID}/" modal-out/ --force || true

        mkdir -p "$RES_DIR"
        OK_JSONS=()
        for apc in $APC_COUNTS; do
          label=$(printf 'apc%03d' "$apc")
          src="modal-out/${RUN_ID}/out-${apc}/metrics.json"
          if [ ! -f "$src" ]; then
            echo "::warning::modal out-${apc}/metrics.json missing; skipping"
            continue
          fi
          mv "$src" "$RES_DIR/${label}.json"
          python ./openvm-riscv/scripts/plot_trace_cells.py \
            -o "$RES_DIR/trace_cells_${label}.png" \
            "$RES_DIR/${label}.json" \
            > "$RES_DIR/trace_cells_${label}.txt"
          OK_JSONS+=("$RES_DIR/${label}.json")
        done

        if [ ${#OK_JSONS[@]} -eq 0 ]; then
          echo "::warning::no Modal outputs survived; dropping ${RES_DIR}/"
          rm -rf "$RES_DIR"
          exit 0
        fi

        mv "$APC_CANDIDATES_JSON" "$RES_DIR/apc_candidates.json"
        python ./openvm-riscv/scripts/basic_metrics.py summary-table --csv \
          "${OK_JSONS[@]}" > "$RES_DIR/basic_metrics.csv"
        python ./openvm-riscv/scripts/basic_metrics.py plot \
          "${OK_JSONS[@]}" -o "$RES_DIR/proof_time_breakdown.png"
        python ./openvm-riscv/scripts/basic_metrics.py combine \
          "${OK_JSONS[@]}" > "$RES_DIR/combined_metrics.json"
        python ./autoprecompiles/scripts/plot_effectiveness.py \
          "$RES_DIR/apc_candidates.json" --output "$RES_DIR/effectiveness.png"
