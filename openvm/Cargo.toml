[package]
name = "powdr-openvm"
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[features]
default = []
aot = ["sdk-v2/aot"]
tco = ["sdk-v2/tco"]
metrics = ["sdk-v2/metrics", "openvm-stark-backend/metrics", "openvm-stark-sdk/metrics"]
cuda = ["sdk-v2/cuda", "openvm-circuit-primitives/cuda", "dep:openvm-cuda-backend", "dep:openvm-cuda-common", "dep:openvm-cuda-builder"]

[dependencies]
itertools.workspace = true
openvm-circuit.workspace = true
openvm-circuit-primitives.workspace = true
openvm-instructions.workspace = true
openvm-stark-backend.workspace = true
openvm-stark-sdk.workspace = true
powdr-autoprecompiles.workspace = true
powdr-expression.workspace = true
powdr-openvm-bus-interaction-handler.workspace = true
openvm-circuit-derive.workspace = true
openvm-circuit-primitives-derive.workspace = true
sdk-v2.workspace = true
openvm-sdk-config.workspace = true
openvm-cuda-backend = { workspace = true, optional = true }
openvm-cuda-common = { workspace = true, optional = true }
openvm-transpiler.workspace = true
serde.workspace = true
powdr-number.workspace = true
derive_more.workspace = true
powdr-constraint-solver.workspace = true
tracing.workspace = true
rustc-demangle = "0.1.25"
metrics.workspace = true
indicatif = "0.18.3"
cfg-if = "1.0.4"
powdr-riscv-elf.workspace = true

[build-dependencies]
openvm-cuda-builder = { workspace = true, optional = true }
