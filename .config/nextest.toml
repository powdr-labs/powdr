# Profiles to fail after a timeout, but continue with the other tests 
[profile.quick-10]
slow-timeout = { period = "10s", terminate-after = 1 }
fail-fast = false

[profile.quick-30]
slow-timeout = { period = "30s", terminate-after = 1 }
fail-fast = false

[profile.quick-60]
slow-timeout = { period = "60s", terminate-after = 1 }
fail-fast = false

# Deprioritize known slow tests so fast tests run first (applies to all profiles)
[[profile.default.overrides]]
filter = 'test(prove) | test(pgo) | test(test_ecrecover) | test(test_sha256) | test(test_optimize)'
priority = -50
