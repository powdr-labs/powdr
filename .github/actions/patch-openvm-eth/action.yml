name: "Patch openvm-eth"
description: "Checks out powdr-labs/openvm-eth at the ref pinned in .github/openvm-eth.ref and patches it to use local powdr crates."

outputs:
  ref:
    description: "The openvm-eth git ref that was checked out."
    value: ${{ steps.ref.outputs.value }}

runs:
  using: "composite"
  steps:
    - name: Read pinned openvm-eth ref
      id: ref
      shell: bash
      run: echo "value=$(cat .github/openvm-eth.ref)" >> $GITHUB_OUTPUT

    - name: Checkout openvm-eth
      uses: actions/checkout@v4
      with:
        repository: powdr-labs/openvm-eth
        ref: ${{ steps.ref.outputs.value }}
        path: openvm-eth

    - name: Patch openvm-eth to use local powdr
      shell: bash
      run: |
        cd openvm-eth
        mkdir -p .cargo
        cat <<'EOF' > .cargo/config.toml
        [patch."https://github.com/powdr-labs/powdr.git"]
        powdr-openvm-riscv = { path = "../openvm-riscv" }
        powdr-openvm = { path = "../openvm" }
        powdr-riscv-elf = { path = "../riscv-elf" }
        powdr-number = { path = "../number" }
        powdr-autoprecompiles = { path = "../autoprecompiles" }
        powdr-openvm-riscv-hints-circuit = { path = "../openvm-riscv/extensions/hints-circuit" }
        EOF
