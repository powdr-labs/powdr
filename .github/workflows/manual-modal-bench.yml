name: Manual Modal benchmark

# Manually-triggered Modal-GPU prove-stark benchmark of openvm-eth, intended
# for ad-hoc experiments (alternative APC counts, different blocks, etc.)
# outside the nightly cadence. Same flow as nightly's test_apc_reth Modal
# leg — prefetch RPC + compile APC caches on the runner, ship them to a
# Modal Volume, prove on a rented L40S, pull metrics back, post-process —
# and publishes the result to bench-results/results/<date>-modal-<run_name>/.
on:
  workflow_dispatch:
    inputs:
      run_name:
        description: 'Short name for this run, used as the bench-results dir suffix. Allowed chars: A-Z a-z 0-9 . _ -'
        required: true
        type: string
      apc_counts:
        description: 'Space-separated APC counts to prove on Modal.'
        required: false
        default: "0 10 30"
        type: string
      block_number:
        description: 'Ethereum block number to prove.'
        required: false
        default: "24171377"
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  JEMALLOC_SYS_WITH_MALLOC_CONF: "retain:true,background_thread:true,metadata_thp:always,dirty_decay_ms:10000,muzzy_decay_ms:10000,abort_conf:true"
  POWDR_OPENVM_SEGMENT_DELTA: 50000

jobs:
  modal_bench:
    runs-on: server-dev

    env:
      RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      # Separate volume from the nightly so concurrent manual + nightly
      # runs cannot stomp on each other's cache tarballs even if RUN_IDs
      # ever collide; both volumes are created on demand and cleaned up
      # at job end.
      MODAL_VOLUME: powdr-manual-gpu-cache
      BLOCK_NUMBER: ${{ inputs.block_number }}
      APC_COUNTS: ${{ inputs.apc_counts }}
      RUN_NAME: ${{ inputs.run_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate inputs
        # Both values flow into shell loops and a git-pushed directory
        # name, so reject anything outside a safe character class up
        # front rather than later in the pipeline.
        run: |
          if ! [[ "$RUN_NAME" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::run_name must match [A-Za-z0-9._-]+ (got: '$RUN_NAME')"
            exit 1
          fi
          if ! [[ "$APC_COUNTS" =~ ^[0-9[:space:]]+$ ]]; then
            echo "::error::apc_counts must be whitespace-separated non-negative integers (got: '$APC_COUNTS')"
            exit 1
          fi
          if ! [[ "$BLOCK_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::block_number must be a non-negative integer (got: '$BLOCK_NUMBER')"
            exit 1
          fi

      - name: Resolve openvm-eth ref
        # Single source of truth for the openvm-eth ref lives in the
        # patch-openvm-eth action; read it from there so we don't have
        # to remember to update two places.
        id: openvm_eth
        run: |
          REF=$(awk '/^[[:space:]]*ref:/ {print $2; exit}' .github/actions/patch-openvm-eth/action.yml)
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: ⚡ Cache rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-apc-${{ hashFiles('**/Cargo.toml') }}

      - name: Install cargo openvm
        # Rust 1.91.1 is needed by fresher versions of dependencies of cargo-openvm.
        run: |
          rustup toolchain install 1.91.1
          cargo +1.91.1 install --git 'https://github.com/powdr-labs/openvm.git' --tag "v2.0.0-beta.2-powdr" cargo-openvm

      - name: Install OpenVM guest toolchain
        run: |
          rustup toolchain install nightly-2026-01-18
          rustup component add rust-src --toolchain nightly-2026-01-18

      - name: Setup python venv
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -r openvm-riscv/scripts/requirements.txt
          pip install -r autoprecompiles/scripts/requirements.txt
          pip install modal

      - name: Remove old results if present
        run: |
          rm -rf results
          mkdir -p results

      - name: Patch benchmark
        uses: ./.github/actions/patch-openvm-eth

      - name: Prefetch RPC cache (CPU)
        run: |
          cd openvm-eth
          echo "export RPC_1=${{ secrets.RPC_1 }}" >> .env
          ./run.sh --apc 0 --block "$BLOCK_NUMBER" --mode execute || exit 1
          tar -czf ../rpc-cache.tgz rpc-cache

      - name: Compile APC caches (CPU)
        # Compile only for the apc counts that will actually be proved on
        # Modal — unlike the nightly we have no CPU-side prove-stark loop
        # to feed.
        run: |
          cd openvm-eth
          for apc in $APC_COUNTS; do
            ./run.sh --apc "$apc" --block "$BLOCK_NUMBER" --mode compile || exit 1
          done
          tar -czf ../apc-cache.tgz apc-cache
          cp apcs/apc_candidates.json ../apc_candidates_modal.json

      - name: Run Modal prove-stark
        uses: ./.github/actions/run-modal-prove-stark
        with:
          apc-counts: ${{ inputs.apc_counts }}
          block-number: ${{ inputs.block_number }}
          openvm-eth-ref: ${{ steps.openvm_eth.outputs.ref }}
          modal-volume: ${{ env.MODAL_VOLUME }}
          run-id: ${{ env.RUN_ID }}
          powdr-sha: ${{ github.sha }}
          modal-token-id: ${{ secrets.MODAL_TOKEN_ID }}
          modal-token-secret: ${{ secrets.MODAL_TOKEN_SECRET }}
          results-dir: results/reth_gpu_modal

      - name: Save revisions and run info
        run: |
          echo "openvm-eth: ${{ steps.openvm_eth.outputs.ref }}" > results/run.txt
          echo "powdr: $GITHUB_SHA" >> results/run.txt
          echo "run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> results/run.txt
          echo "name: $RUN_NAME" >> results/run.txt
          echo "block: $BLOCK_NUMBER" >> results/run.txt
          echo "apc-counts: $APC_COUNTS" >> results/run.txt

      - name: get the date/time
        id: date
        run: echo "value=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Generate bench results README
        run: |
          source .venv/bin/activate
          python3 ./openvm-riscv/scripts/generate_bench_results_readme.py \
            ./results \
            "${{ steps.date.outputs.value }}-modal-${{ env.RUN_NAME }}" \
            --output ./results/readme.md

      - name: upload result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-modal-${{ env.RUN_NAME }}
          path: |
            results/*
          if-no-files-found: ignore

      # Push via partial+sparse clone so the runner only ever holds the new
      # dir on disk — same pattern as nightly's publish_bench_results +
      # test_apc_gpu jobs.
      - name: commit to bench results
        env:
          BENCH_RESULTS_TOKEN: ${{ secrets.BENCH_RESULTS_TOKEN }}
          DATE: ${{ steps.date.outputs.value }}-modal-${{ env.RUN_NAME }}
        run: |
          set -euo pipefail
          REPO=$(mktemp -d)
          git clone --filter=blob:none --sparse --depth=1 --branch=gh-pages \
            "https://x-access-token:${BENCH_RESULTS_TOKEN}@github.com/powdr-labs/bench-results.git" \
            "$REPO"
          cd "$REPO"
          git sparse-checkout set "results/${DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p "results/${DATE}"
          cp -r "${GITHUB_WORKSPACE}/results/." "results/${DATE}/"
          git add "results/${DATE}"
          git commit -m "Add manual modal results for ${DATE}"
          git push origin gh-pages

      - name: Cleanup Modal Volume
        if: always()
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          source .venv/bin/activate || true
          modal volume rm "$MODAL_VOLUME" "/${RUN_ID}" --recursive 2>&1 || true
